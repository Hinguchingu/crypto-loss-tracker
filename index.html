<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Crypto Loss Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header>

<h1>Crypto Loss Tracker</h1>

<p>Your Personal Portfolio</p>

</header>

<section class="lossCard">

<span>Current Loss</span>

<h2 id="loss">₹0</h2>

</section>

<section class="grid">

<div class="box">
<label>Deposit</label>
<h3 id="deposit">0</h3>
</div>

<div class="box">
<label>Buy</label>
<h3 id="buyTotal">0</h3>
</div>

<div class="box">
<label>Sale</label>
<h3 id="saleTotal">0</h3>
</div>

<div class="box">
<label>Withdrawal</label>
<h3 id="withdraw">0</h3>
</div>

</section>

<section class="action">

<input
type="number"
id="buyInput"
placeholder="Buy Amount">

<button onclick="addBuy()">

Add Buy

</button>

</section>

<section class="action">

<input
type="number"
id="sellInput"
placeholder="Sell Amount">

<button onclick="addSell()">

Add Sell

</button>

</section>

<section class="history">

<h2>Transaction History</h2>

<div id="history">

<p class="empty">
No Transactions Yet
</p>

</div>

</section>
  script src="app.js"></script>

</body>
</html>
